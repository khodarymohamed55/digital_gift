<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حكايتنا 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0f0f12; color: #fff; font-family: 'Cairo', sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 25px; backdrop-filter: blur(10px); width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .counter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; font-size: 14px; }
        .box span { display: block; font-size: 18px; font-weight: bold; color: #ff4081; }
        input { background: rgba(255,255,255,0.1); border: none; padding: 12px; width: 80%; border-radius: 15px; color: white; margin-bottom: 10px; text-align: center; }
        button { background: #ff4081; border: none; padding: 10px 30px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        audio { margin-top: 20px; width: 100%; filter: invert(1); }
    </style>
</head>
<body>

    <div id="login" class="container">
        <h2>أهلاً بكِ في حكايتنا 🎁</h2>
        <input type="password" id="pass" placeholder="كلمة السر">
        <br>
        <button onclick="check()">فتح الصندوق 💌</button>
        <p id="error" style="color: #ff4081;"></p>
    </div>

    <div id="gift" class="container hidden">
        <h2>بداية حكايتنا 😍❤️</h2>
        <div class="counter-grid" id="timer">
            </div>
        <div class="box">
            <p>I love you, Today, Tomorrow, And always. ✨</p>
        </div>
        <audio id="music" controls>
            <source src="https://voca.ro/1cSStP1KJ5AU.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value === '2007') {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('gift').classList.remove('hidden');
            } else {
                document.getElementById('error').innerText = 'كلمة السر غير صحيحة';
            }
        }

        function update() {
            const start = new Date("2021-07-19T00:00:00");
            const now = new Date();
            const diff = now - start;
            
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            const months = Math.floor(days / 30);
            const years = Math.floor(months / 12);

            document.getElementById('timer').innerHTML = `
                <div class="box"><span>${years}</span>سنين</div>
                <div class="box"><span>${months % 12}</span>شهور</div>
                <div class="box"><span>${days % 30}</span>أيام</div>
                <div class="box"><span>${hours % 24}</span>ساعات</div>
                <div class="box"><span>${minutes % 60}</span>دقايق</div>
                <div class="box"><span>${seconds % 60}</span>ثواني</div>
            `;
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
