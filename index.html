<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هدية خاصة 💌</title>
    <style>
        body { background-color: #fce4ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; }
        input { width: 80%; padding: 10px; margin: 20px 0; border: 2px solid #f8bbd0; border-radius: 10px; text-align: center; }
        button { background: #e91e63; color: white; border: none; padding: 10px 30px; border-radius: 10px; cursor: pointer; }
        #mainContent { display: none; }
        .counter { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .box { background: #f8bbd0; padding: 10px; border-radius: 10px; width: 60px; }
    </style>
</head>
<body>

    <!-- قسم القفل -->
    <div id="login" class="container">
        <h2>هدية خاصة 💌</h2>
        <input type="password" id="passInput" placeholder="كلمة السر">
        <br>
        <button onclick="checkPassword()">فتح الظرف</button>
    </div>

    <!-- قسم المحتوى -->
    <div id="mainContent" class="container">
        <h1>ذكرياتنا ✨</h1>
        <div class="counter">
            <div class="box"><span id="days">0</span><br>يوم</div>
            <div class="box"><span id="hours">0</span><br>ساعة</div>
        </div>
        <p>كل ثانية بحبك أكثر ❤️</p>
    </div>

    <script>
        function checkPassword() {
            let pass = document.getElementById("passInput").value;
            if (pass === "2007") {
                document.getElementById("login").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
                startCounter();
            } else {
                alert("كلمة السر خاطئة!");
            }
        }

        function startCounter() {
            // تاريخ البداية
            const startDate = new Date("2025-10-03T00:00:00");
            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                
                document.getElementById("days").innerText = days;
                document.getElementById("hours").innerText = hours;
            }, 1000);
        }
    </script>
</body>
</html>
